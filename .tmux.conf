#color support
set -g default-terminal "screen-256color"
set -g terminal-overrides ',xterm-256color:RGB'
set -sg escape-time 0
set -gq allow-passthrough on

setw -g mouse on

set-option -g default-shell $SHELL
set-option -g set-titles on
set-option -g set-titles-string '#{?ENV:SSH_CLIENT,#H : ,}#S: #W'

# nicer prefix
unbind C-b
set -g prefix C-Space
bind Space send-prefix

bind r source ~/.tmux.conf \; display-message 'Config reloaded'
 
# Splits
bind -n M-e split-window -h -c "#{pane_current_path}"
bind -n M-o split-window -v -c "#{pane_current_path}"
bind w new-window -c "#{pane_current_path}"

# Pane resize
bind -n M-Left resize-pane -L 3
bind -n M-Right resize-pane -R 3
bind -n M-Up resize-pane -U 3
bind -n M-Down resize-pane -D 3

# Pane + window movement

# vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
# is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
#     | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

vim_pattern='\<(vi|n?vim)([-_].*)?\>'
is_vim="ps -o args= -t '#{pane_tty}' \
    | grep -iqE '${vim_pattern}'"

bind -n 'M-h' if-shell "$is_vim" 'send-keys ^[h '  'select-pane -L'
bind -n 'M-j' if-shell "$is_vim" 'send-keys ^[j '  'select-pane -D'
bind -n 'M-k' if-shell "$is_vim" 'send-keys ^[k '  'select-pane -U'
bind -n 'M-l' if-shell "$is_vim" 'send-keys ^[l '  'select-pane -R'
bind -n 'M-f' if-shell "$is_vim" 'display-message "vim !" '  'display-message "not vim'

# bind -n M-n select-pane -t :.+
# bind -n M-k select-pane -U
# bind -n M-j select-pane -D
# bind -n M-h select-pane -L
# bind -n M-l select-pane -R

bind -n M-w select-window -n

bind -n M-d kill-pane

# vi like commands
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi C-e send -X halfpage-down
bind -n M-m copy-mode
 
bind b setw synchronize-panes

bind r source ~/.tmux.conf \; 
#display-message 'Config reloaded'


bind -n M-& run-shell "$HOME/.local/scripts/change-theme"

# Return to main session
bind 0 attach -t main
bind 1 switch-client -l

# sessionizer
bind-key -n C-f display-popup -E "~/.local/scripts/tmux-sessionizer"
set-option -g detach-on-destroy off

# status bar
set -g status-style "bg=#{?#{env:SSH_CLIENT},blue,white},fg=black"

# set -g status-style "bg=red"

set -g status-position top
set -g status-justify centre
set -g status-left-length 60
set -g status-right-length 120

set -g status-left "#{?#{==:#{E:SSH_CLIENT},},#{?#{==:#{E:MATRYOSHKA_COUNTER},},*,}, #{?#{==:#{E:MATRYOSHKA_COUNTER},1},*,}}#{session_name}"
set -g status-right "#(whoami)@#H %H:%M %d-%b-%y"

set -g status-fg black

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'niqodea/tmux-matryoshka'

# keybind to disable outer-most active tmux
set -g @matryoshka_down_keybind 'F2'
# keybind to enable inner-most inactive tmux
set -g @matryoshka_up_keybind 'F1'
# keybind to recursively enable all tmux instances
set -g @matryoshka_up_recursive_keybind 'F3'

run '~/.tmux/plugins/tpm/tpm'
